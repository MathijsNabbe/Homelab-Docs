name: Change Services Repository

on:
  workflow_dispatch:
    inputs:
      repository:
        description: "Repository URL to use as the Services submodule"
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  switch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          submodules: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Remove existing submodule
        run: |
          git submodule deinit -f Services || true
          git rm -f Services || true
          rm -rf .git/modules/Services
          rm -rf Services

      - name: Configure private repository authentication
        env:
          HOMELAB_DOCS_SUBMODULE: ${{ secrets.HOMELAB_DOCS_SUBMODULE }}
        run: |
          git config --global \
            url."https://x-access-token:${HOMELAB_DOCS_SUBMODULE}@github.com/".insteadOf \
            "https://github.com/"
      
      - name: Add new submodule
        run: |
          git submodule add "${{ github.event.inputs.repository }}" Services

      - name: Commit changes
        run: |
          git add .gitmodules Services

          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi

          git commit -m "Switch Services submodule"

      - name: Try pushing directly to main
        id: push_main
        continue-on-error: true
        run: |
          git push origin HEAD:main

      - name: Push to temporary branch
        if: steps.push_main.outcome == 'failure'
        env:
          BRANCH: switch-services-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"

      - name: Create Pull Request
        if: steps.push_main.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: switch-services-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "Switch Services submodule" \
            --body "Direct push was blocked by branch protection, so this PR was created automatically."
