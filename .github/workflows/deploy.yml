name: Generate Mapping & Deploy Pages

on:
  workflow_run:
    workflows:
      - Build Parser & Visualizer
    types:
      - completed

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event != 'pull_request'

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}
          submodules: recursive
          token: ${{ secrets.HOMELAB_DOCS_SUBMODULE }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'

      - name: Download Parser build artifact
        uses: actions/download-artifact@v4
        with:
          name: parser-build
          path: Parser/src/Parser/bin/Release/net11.0/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download Visualizer artifact
        uses: actions/download-artifact@v4
        with:
          name: visualizer-dist
          path: dist
          github-token: ${{ secrets.GITHUB_TOKEN }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Run Parser
        run: |
          dotnet Parser/src/Parser/bin/Release/net11.0/Parser.dll

      - name: Copy mapping.json into Pages artifact
        run: |
          cp mapping.json dist/mapping.json

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4