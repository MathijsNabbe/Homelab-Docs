name: Build Parser & Visualizer

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-parser:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.HOMELAB_DOCS_SUBMODULE }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '11.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Parser/**/Directory.Packages.props', 'Parser/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build Parser
        run: dotnet build Parser/src/Parser/Parser.csproj --configuration Release

      - name: Upload Parser build artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: parser-build
          path: Parser/src/Parser/bin/Release/net11.0/
          if-no-files-found: error


  build-visualizer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          token: ${{ secrets.HOMELAB_DOCS_SUBMODULE }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Visualizer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Visualizer

      - name: Build Visualizer
        run: npm run build -- --base=/
        working-directory: Visualizer

      - name: Upload Visualizer artifact
        if: github.event_name != 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: visualizer-dist
          path: Visualizer/dist/
          if-no-files-found: error