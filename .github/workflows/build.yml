name: Build, Execute & Deploy to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-parser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          token: ${{ secrets.HOMELAB_DOCS_SUBMODULE }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('Parser/**/Directory.Packages.props', 'Parser/**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      - name: Build Parser
        run: dotnet build Parser/src/Parser/Parser.csproj --configuration Release

      - name: Upload Parser build
        uses: actions/upload-artifact@v4
        with:
          name: parser-build
          path: Parser/src/Parser/bin/Release/net10.0/
          if-no-files-found: error

  build-visualizer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          token: ${{ secrets.HOMELAB_DOCS_SUBMODULE }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: Visualizer/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: Visualizer

      - name: Build Visualizer
        run: npm run build -- --base=/
        working-directory: Visualizer

      - name: Upload Visualizer dist
        uses: actions/upload-artifact@v4
        with:
          name: visualizer-dist
          path: Visualizer/dist/
          if-no-files-found: error

  generate-mapping:
    runs-on: ubuntu-latest
    needs: build-parser
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: recursive
          token: ${{ secrets.HOMELAB_DOCS_SUBMODULE }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Parser build
        uses: actions/download-artifact@v4
        with:
          name: parser-build
          path: Parser/src/Parser/bin/Release/net10.0/

      - name: Run Parser
        run: dotnet Parser/src/Parser/bin/Release/net10.0/Parser.dll

      - name: Upload mapping.json
        uses: actions/upload-artifact@v4
        with:
          name: mapping-json
          path: mapping.json
          if-no-files-found: error

  deploy-pages:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    needs: [build-visualizer, generate-mapping]
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Download Visualizer dist
        uses: actions/download-artifact@v4
        with:
          name: visualizer-dist
          path: dist

      - name: Download mapping.json
        uses: actions/download-artifact@v4
        with:
          name: mapping-json
          path: dist

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5